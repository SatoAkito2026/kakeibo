<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家計簿</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:15px}
.app{max-width:420px;margin:0 auto;padding-bottom:84px;min-height:100vh;background:#f5f5f5}
.hdr{background:#fff;border-bottom:0.5px solid #e0e0e0;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-t{font-size:17px;font-weight:700;color:#1a1a1a}
.hdr-s{font-size:12px;color:#888;margin-top:1px}
.bnav{display:flex;background:#fff;border-top:0.5px solid #e0e0e0;padding:2px 0 6px;position:sticky;bottom:0;z-index:50}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 4px;border:none;background:none;cursor:pointer;font-size:10px;color:#aaa}
.nb i{font-size:22px}
.nb.on{color:#1D9E75}
.sec{display:none;padding:12px}
.sec.on{display:block}
.card{background:#fff;border:0.5px solid #e8e8e8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.met{background:#f7f7f7;border-radius:8px;padding:10px 12px}
.met .lbl{font-size:12px;color:#888;margin-bottom:3px}
.met .val{font-size:15px;font-weight:700;word-break:break-all}
.met .val.r{color:#A32D2D}.met .val.g{color:#0F6E56}.met .val.b{color:#185FA5}
.bignum{font-size:24px;font-weight:700;word-break:break-all;color:#1a1a1a}
.bignum.r{color:#A32D2D}
.lbl-sm{font-size:12px;color:#888}
.prog-wrap{height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-top:5px}
.prog-bar{height:100%;border-radius:4px}
.sec-hd{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.05em;margin:14px 0 7px;text-transform:uppercase}
.addbtn{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px}
.addbtn:active{opacity:.85}
.txi{background:#fff;border:0.5px solid #e8e8e8;border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px;cursor:pointer}
.txico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.txb{flex:1;min-width:0}
.txt{font-size:13px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txm{font-size:11px;color:#aaa;margin-top:1px;display:flex;align-items:center;gap:4px}
.txa{font-size:13px;font-weight:700;flex-shrink:0;text-align:right;max-width:100px;word-break:break-all}
.txa.r{color:#A32D2D}.txa.g{color:#0F6E56}.txa.b{color:#185FA5}
.nodata{text-align:center;padding:28px;color:#ccc;font-size:13px}
.dglbl{font-size:12px;color:#aaa;margin:10px 0 5px;font-weight:600}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:5px 12px;border:0.5px solid #e0e0e0;border-radius:40px;font-size:13px;cursor:pointer;background:#fff;color:#888}
.tab.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;border:1px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:15px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:#1D9E75}
.frow textarea{height:52px;resize:none}
.catsel{padding-left:32px!important;font-weight:600}
.cat-wrap{position:relative}
.cat-dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;pointer-events:none;z-index:1}
.ttog{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-bottom:10px}
.tbtn{padding:8px 4px;border:1px solid #e0e0e0;border-radius:8px;background:#f7f7f7;cursor:pointer;font-size:12px;font-weight:600;color:#888;text-align:center;line-height:1.5}
.tbtn.ae{background:#FAECE7;border-color:#D85A30;color:#993C1D}
.tbtn.ai{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.tbtn.ac{background:#E6F1FB;border-color:#378ADD;color:#185FA5}
.recarea{border:1.5px dashed #ccc;border-radius:8px;padding:14px;text-align:center;cursor:pointer;margin-bottom:10px}
.recarea i{font-size:22px;color:#ccc;display:block;margin-bottom:3px}
.recarea .ph{font-size:12px;color:#ccc}
.s2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.bcnl{padding:11px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#888}
.bsav{padding:11px;border:none;border-radius:8px;background:#1D9E75;color:#fff;cursor:pointer;font-size:14px;font-weight:600}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.42);z-index:200;align-items:flex-end;justify-content:center}
.ovl.on{display:flex}
.sheet{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:420px;padding:20px;max-height:88vh;overflow-y:auto}
.sheet h2{font-size:16px;font-weight:700;margin-bottom:14px}
.dlrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f0f0f0;font-size:14px;gap:8px}
.dlrow:last-of-type{border:none}
.dlk{color:#888;flex-shrink:0}
.dlv{font-weight:600;color:#1a1a1a;text-align:right;word-break:break-all}
.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.bedit{padding:11px;border:1px solid #1D9E75;border-radius:8px;background:none;color:#0F6E56;cursor:pointer;font-size:14px;font-weight:600}
.bdel{padding:11px;border:1px solid #D85A30;border-radius:8px;background:none;color:#993C1D;cursor:pointer;font-size:14px}
.bcls{width:100%;margin-top:8px;padding:11px;border:1px solid #e0e0e0;border-radius:8px;background:none;cursor:pointer;font-size:14px;color:#888}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #f0f0f0;gap:8px}
.set-row:last-child{border:none}
.set-lbl{font-size:14px;color:#1a1a1a;flex-shrink:0}
.set-val{font-size:13px;color:#888;display:flex;align-items:center;gap:4px;cursor:pointer;word-break:break-all;text-align:right}
.fix-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid #f0f0f0;gap:8px}
.fix-item:last-child{border:none}
.hint{background:#f7f7f7;border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:12px;color:#888;line-height:1.6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:6px}
.cal-hd{text-align:center;font-size:11px;color:#aaa;padding:3px 0}
.cal-d{text-align:center;padding:4px 2px;border-radius:5px;cursor:pointer;font-size:12px;min-height:30px;display:flex;flex-direction:column;align-items:center;position:relative}
.cal-d.today{background:#E1F5EE;color:#0F6E56;font-weight:700}
.cal-d.hasdot::after{content:'';width:4px;height:4px;border-radius:50%;background:#D85A30;position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mnav button{background:none;border:none;cursor:pointer;color:#888;font-size:18px;padding:4px 8px;border-radius:6px}
.mnav span{font-size:15px;font-weight:700;color:#1a1a1a}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.badge.warn{background:#FAEEDA;color:#633806}
.badge.ok{background:#E1F5EE;color:#0F6E56}
.badge.over{background:#FAECE7;color:#993C1D}
.wrow{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px}
.whalf{background:#f7f7f7;border-radius:8px;padding:10px 12px}
.whalf .wlbl{font-size:12px;color:#888;margin-bottom:3px}
.whalf .wval{font-size:15px;font-weight:700;color:#185FA5;word-break:break-all}
.wbtns{display:flex;gap:6px}
.wbtn{flex:1;padding:8px 4px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:11px;color:#888;text-align:center}
.wbtn.pri{background:#E6F1FB;border-color:#378ADD;color:#185FA5;font-weight:600}
.goal-card{background:#fff;border:0.5px solid #e8e8e8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.goal-remain{font-size:20px;font-weight:700;color:#1D9E75;word-break:break-all}
.pie-legend{width:100%;margin-top:14px;display:flex;flex-direction:column;gap:7px}
.pie-leg-row{display:flex;align-items:center;justify-content:space-between;font-size:13px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:7px}
.pie-leg-left{display:flex;align-items:center;flex:1;min-width:0}
.pie-leg-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a1a}
.month-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.month-lbl{font-size:12px;color:#888;width:58px;flex-shrink:0;padding-top:2px}
.month-bars{flex:1;display:flex;flex-direction:column;gap:4px}
.bar-line{display:flex;align-items:center;gap:6px}
.bar-outer{height:9px;background:#f0f0f0;border-radius:4px;overflow:hidden;flex:1}
.bar-inner{height:100%;border-radius:4px}
.bar-val{font-size:11px;width:82px;text-align:right;flex-shrink:0;word-break:break-all}
.stats-filter{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stats-filter select{border:1px solid #e0e0e0;border-radius:8px;padding:6px 10px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;cursor:pointer}
.stats-filter select:focus{border-color:#1D9E75}
.chatbtn{position:fixed;bottom:100px;right:16px;width:48px;height:48px;border-radius:50%;background:#1D9E75;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:80}
.chatbtn i{font-size:22px;color:#fff}
.chat-panel{display:none;position:fixed;bottom:158px;right:12px;width:300px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;z-index:90;overflow:hidden;flex-direction:column}
.chat-panel.on{display:flex}
.chat-hdr{padding:10px 14px;border-bottom:0.5px solid #f0f0f0;font-size:13px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;justify-content:space-between}
.chat-msgs{height:210px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:7px 10px;border-radius:10px;font-size:13px;line-height:1.5}
.msg.ai{background:#f5f5f5;color:#1a1a1a;align-self:flex-start;border-radius:4px 10px 10px 10px}
.msg.user{background:#1D9E75;color:#fff;align-self:flex-end;border-radius:10px 4px 10px 10px}
.msg.thinking{color:#bbb;font-style:italic}
.chat-inp{display:flex;gap:6px;padding:8px 10px;border-top:0.5px solid #f0f0f0}
.chat-inp input{flex:1;border:1px solid #e0e0e0;border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.chat-inp input:focus{border-color:#1D9E75}
.chat-inp button{padding:7px 12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div><div class="hdr-t" id="HDR_T">家計簿</div><div class="hdr-s" id="HDR_S"></div></div>
    <i class="ti ti-settings" style="font-size:20px;color:#aaa;cursor:pointer" onclick="showSec('settings')"></i>
  </div>
  <div class="sec on" id="sec-home"><div id="H"></div></div>
  <div class="sec" id="sec-add"><div id="A"></div></div>
  <div class="sec" id="sec-hist"><div id="L"></div></div>
  <div class="sec" id="sec-stats"><div id="ST"></div></div>
  <div class="sec" id="sec-settings"><div id="SE"></div></div>
  <div class="bnav">
    <button class="nb on" id="nb-home" onclick="showSec('home')"><i class="ti ti-home"></i>ホーム</button>
    <button class="nb" id="nb-add" onclick="showSec('add')"><i class="ti ti-plus"></i>記録</button>
    <button class="nb" id="nb-hist" onclick="showSec('hist')"><i class="ti ti-list"></i>履歴</button>
    <button class="nb" id="nb-stats" onclick="showSec('stats')"><i class="ti ti-chart-bar"></i>分析</button>
  </div>
</div>
<button class="chatbtn" onclick="toggleChat()"><i class="ti ti-message-circle"></i></button>
<div class="chat-panel" id="CHAT">
  <div class="chat-hdr">
    <span><i class="ti ti-sparkles" style="font-size:14px;margin-right:4px;color:#1D9E75"></i>家計AIアドバイザー</span>
    <button onclick="toggleChat()" style="background:none;border:none;cursor:pointer;font-size:16px;color:#aaa"><i class="ti ti-x"></i></button>
  </div>
  <div class="chat-msgs" id="CMSG"></div>
  <div class="chat-inp">
    <input type="text" id="CINP" placeholder="家計の相談をどうぞ…" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">送信</button>
  </div>
</div>
<div class="ovl" id="OVL" onclick="closeOvl(event)"><div class="sheet" id="SHT"></div></div>
<input type="file" accept="image/*" capture="environment" id="RF" style="display:none" onchange="onRcpt(event)">

<script>
const ECAT=[
  {name:'食費',color:'#EF9F27'},{name:'外食',color:'#D85A30'},{name:'交通費',color:'#378ADD'},
  {name:'日用品',color:'#1D9E75'},{name:'娯楽',color:'#7F77DD'},{name:'衣類',color:'#D4537E'},
  {name:'医療',color:'#E24B4A'},{name:'通信',color:'#5DCAA5'},{name:'光熱費',color:'#BA7517'},
  {name:'住居',color:'#888780'},{name:'教育',color:'#639922'},{name:'その他',color:'#B4B2A9'},
];
const ICAT=[
  {name:'給与',color:'#1D9E75'},{name:'副収入',color:'#5DCAA5'},
  {name:'ボーナス',color:'#EF9F27'},{name:'その他',color:'#B4B2A9'},
];
const ICON={食費:'ti-basket',外食:'ti-tools-kitchen-2',交通費:'ti-train',日用品:'ti-shopping-bag',娯楽:'ti-device-gamepad',衣類:'ti-shirt',医療:'ti-first-aid-kit',通信:'ti-device-mobile',光熱費:'ti-bulb',住居:'ti-home',教育:'ti-school',給与:'ti-cash',副収入:'ti-coins',ボーナス:'ti-trophy',その他:'ti-dots',ICチャージ:'ti-credit-card','IC乗車':'ti-train'};
const SCOL={ICチャージ:'#378ADD','IC乗車':'#85B7EB'};
function catColor(n){const e=[...ECAT,...ICAT].find(c=>c.name===n);return e?e.color:(SCOL[n]||'#B4B2A9');}

/* ===== STATE =====
   お財布・IC残高は TX + SS.initialWallet/initialSuica から毎回リアルタイム計算。
   直接 walletBal/suicaBal は保存しない（削除と同期させるため）
*/
let TX=[], SS={budget:0,savingGoal:0,initialWallet:0,initialSuica:0,fixedCosts:[]};
let cur='home', hTab='daily', sTab='pie', calMo=new Date();
let aType='expense', aRcpt='', eId=null, chatHist=[];
let statsRange='monthly', statsMonth='', statsYear='';

const fmt=n=>Math.round(Math.abs(n)).toLocaleString('ja-JP')+'円';
const fmtS=(n,f)=>n>=0?(f?'+':'')+Math.round(n).toLocaleString('ja-JP')+'円':'-'+Math.round(Math.abs(n)).toLocaleString('ja-JP')+'円';
const toDay=()=>new Date().toISOString().split('T')[0];
const ymo=d=>d.substring(0,7);
const ymNow=()=>{const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;};
const yearNow=()=>String(new Date().getFullYear());
const fD=d=>{const t=new Date(d);return `${t.getMonth()+1}/${t.getDate()}`;};
const fDF=d=>{const t=new Date(d);return `${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()}`;};
const ymL=s=>{const[y,m]=s.split('-');return `${y}年${parseInt(m)}月`;};

function loadData(){
  try{const r=localStorage.getItem('kb5_tx');if(r)TX=JSON.parse(r);}catch(e){TX=[];}
  try{const r=localStorage.getItem('kb5_ss');if(r)SS=Object.assign(SS,JSON.parse(r));}catch(e){}
  if(!statsMonth)statsMonth=ymNow();
  if(!statsYear)statsYear=yearNow();
}
function saveTX(){try{localStorage.setItem('kb5_tx',JSON.stringify(TX));}catch(e){}}
function saveSS(){try{localStorage.setItem('kb5_ss',JSON.stringify(SS));}catch(e){}}

/* 残高はTXから毎回計算 */
function calcWallet(){
  let b=SS.initialWallet||0;
  TX.forEach(t=>{
    if(t.type==='income') b+=t.amount;
    else if(t.type==='expense') b-=t.amount;
    else if(t.type==='charge') b-=t.amount; // チャージはお財布から出る
    // ic_use はICから出る、お財布には影響しない
  });
  return Math.round(b);
}
function calcSuica(){
  let b=SS.initialSuica||0;
  TX.forEach(t=>{
    if(t.type==='charge') b+=t.amount;
    else if(t.type==='ic_use') b-=t.amount;
  });
  return Math.max(0,Math.round(b));
}
function getExp(ym_s){
  return TX.filter(t=>ymo(t.date)===ym_s&&(t.type==='expense'||t.type==='ic_use')).reduce((a,t)=>a+t.amount,0)+SS.fixedCosts.reduce((a,f)=>a+f.amount,0);
}
function getInc(ym_s){
  return TX.filter(t=>ymo(t.date)===ym_s&&t.type==='income').reduce((a,t)=>a+t.amount,0);
}

function showSec(s){
  document.querySelectorAll('.sec').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));
  document.getElementById('sec-'+s).classList.add('on');
  const nb=document.getElementById('nb-'+s);if(nb)nb.classList.add('on');
  cur=s;
  const n=new Date();
  document.getElementById('HDR_S').textContent=`${n.getFullYear()}年${n.getMonth()+1}月`;
  document.getElementById('HDR_T').textContent=s==='settings'?'設定':'家計簿';
  if(s==='home')rHome();
  else if(s==='add')rAdd();
  else if(s==='hist')rHist();
  else if(s==='stats')rStats();
  else if(s==='settings')rSet();
}

function refresh(){
  if(cur==='home')rHome();
  else if(cur==='hist')rHist();
  else if(cur==='stats')rStats();
}

function rHome(){
  const cm=ymNow();
  const exp=getExp(cm), inc=getInc(cm), bal=inc-exp;
  const bgt=SS.budget, goal=SS.savingGoal;
  const saved=Math.max(0,bal);
  const bPct=bgt>0?Math.min(100,Math.round(exp/bgt*100)):0;
  const sPct=goal>0?Math.min(100,Math.round(saved/goal*100)):0;
  const todayTx=TX.filter(t=>t.date===toDay()).sort((a,b)=>b.createdAt-a.createdAt);
  const totFix=SS.fixedCosts.reduce((a,f)=>a+f.amount,0);
  const walletBal=calcWallet(), suicaBal=calcSuica();

  let goalHtml='';
  if(goal>0){
    const remain=goal-saved;
    goalHtml=`<div class="goal-card">
      <div class="lbl-sm" style="margin-bottom:4px">今月の貯金目標</div>
      <div class="goal-remain">${remain<=0?'目標達成！ +'+fmt(saved):'あと '+fmt(remain)}</div>
      <div style="margin-top:7px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span class="lbl-sm">今月 ${fmt(saved)}</span><span class="lbl-sm">目標 ${fmt(goal)}</span>
        </div>
        <div class="prog-wrap"><div class="prog-bar" style="width:${sPct}%;background:#1D9E75"></div></div>
      </div>
    </div>`;
  }
  let bHtml='';
  if(bgt>0){
    const col=bPct>=90?'#D85A30':bPct>=70?'#BA7517':'#1D9E75';
    const bdg=bPct>=100?'<span class="badge over">超過</span>':bPct>=80?'<span class="badge warn">注意</span>':'<span class="badge ok">良好</span>';
    bHtml=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span class="lbl-sm">今月の予算 ${bdg}</span>

/* ===== HISTORY ===== */
function rHist(){
  const tabs=`<div class="tabs">
    <button class="tab ${hTab==='daily'?'on':''}" onclick="setHT('daily')">日別</button>
    <button class="tab ${hTab==='weekly'?'on':''}" onclick="setHT('weekly')">週別</button>

    <button class="tab ${hTab==='calendar'?'on':''}" onclick="setHT('calendar')">カレンダー</button>
  </div>`;
  let body='';
  if(hTab==='daily'){
    const g={};TX.forEach(t=>{(g[t.date]=g[t.date]||[]).push(t);});
    const dates=Object.keys(g).sort((a,b)=>b.localeCompare(a));
    if(!dates.length)body='<div class="nodata">記録がありません</div>';
    else body=dates.map(d=>{
      const e=g[d].filter(t=>t.type==='expense'||t.type==='ic_use').reduce((a,t)=>a+t.amount,0);
      const i=g[d].filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
      return `<div class="dglbl">${fDF(d)}${e?' · -'+fmt(e):''}${i?' · +'+fmt(i):''}</div>${rTxList(g[d].sort((a,b)=>b.createdAt-a.createdAt),'')}`;
    }).join('');
  } else if(hTab==='weekly'){
    const w={};TX.forEach(t=>{const d=new Date(t.date),s=new Date(d);s.setDate(d.getDate()-d.getDay());const k=s.toISOString().split('T')[0];(w[k]=w[k]||[]).push(t);});
    const ks=Object.keys(w).sort((a,b)=>b.localeCompare(a));
    if(!ks.length)body='<div class="nodata">記録がありません</div>';
    else body=ks.map(k=>{
      const e2=new Date(k);e2.setDate(e2.getDate()+6);
      const ex=w[k].filter(t=>t.type==='expense'||t.type==='ic_use').reduce((a,t)=>a+t.amount,0);
      const ic=w[k].filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
      return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:600">${fD(k)}〜${fD(e2.toISOString().split('T')[0])}</span><span style="font-size:12px;color:#888">${w[k].length}件</span></div><div class="g2"><div class="met"><div class="lbl">支出</div><div class="val r">-${fmt(ex)}</div></div><div class="met"><div class="lbl">収入</div><div class="val g">+${fmt(ic)}</div></div></div></div>`;
    }).join('');
  } else if(hTab==='monthly'){
    const m={};TX.forEach(t=>{const k=ymo(t.date);(m[k]=m[k]||[]).push(t);});
    const ks=Object.keys(m).sort((a,b)=>b.localeCompare(a));
    if(!ks.length)body='<div class="nodata">記録がありません</div>';
    else body=ks.map(k=>{
      const ex=getExp(k), ic=getInc(k), bl=ic-ex;
      return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:15px;font-weight:600">${ymL(k)}</span><span style="font-size:15px;font-weight:700;color:${bl>=0?'#0F6E56':'#A32D2D'}">${fmtS(bl,true)}</span></div><div class="g2"><div class="met"><div class="lbl">支出</div><div class="val r">-${fmt(ex)}</div></div><div class="met"><div class="lbl">収入</div><div class="val g">+${fmt(ic)}</div></div></div></div>`;
    }).join('');
  } else body=rCal();
  document.getElementById('L').innerHTML=tabs+`<div>${body}</div>`;
}
function rCal(){
  const y=calMo.getFullYear(),m=calMo.getMonth();
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const pre=`${y}-${String(m+1).padStart(2,'0')}`;
  const txM=TX.filter(t=>t.date.startsWith(pre)), tn=new Date();
  let h=`<div class="mnav"><button onclick="prevMo()"><i class="ti ti-chevron-left"></i></button><span>${y}年${m+1}月</span><button onclick="nextMo()"><i class="ti ti-chevron-right"></i></button></div>
  <div class="cal-grid">${['日','月','火','水','木','金','土'].map(d=>`<div class="cal-hd">${d}</div>`).join('')}${Array(first).fill('<div></div>').join('')}`;
  for(let d=1;d<=dim;d++){
    const ds=`${pre}-${String(d).padStart(2,'0')}`;
    const has=txM.some(t=>t.date===ds), isT=d===tn.getDate()&&m===tn.getMonth()&&y===tn.getFullYear();
    h+=`<div class="cal-d${isT?' today':''}${has?' hasdot':''}" onclick="showDaySht('${ds}')">${d}</div>`;
  }
  return h+'</div>';
}
function prevMo(){calMo.setMonth(calMo.getMonth()-1);rHist();}
function nextMo(){calMo.setMonth(calMo.getMonth()+1);rHist();}

  const list=TX.filter(t=>t.date===ds);if(!list.length)return;
  SHT.innerHTML=`<h2>${fDF(ds)}</h2>${rTxList(list.sort((a,b)=>b.createdAt-a.createdAt),'')}<button class="bcls" style="margin-top:10px" onclick="closeOvl()">閉じる</button>`;

}

/* ===== STATS ===== */
function getAllYears(){

function getAllMonths(){

  return [...ms].sort((a,b)=>b.localeCompare(a));

function rStats(){
  const allYears=getAllYears(), allMonths=getAllMonths();
  if(!statsMonth||!allMonths.includes(statsMonth))statsMonth=ymNow();
  if(!statsYear||!allYears.includes(statsYear))statsYear=yearNow();

  const rangeControls=`<div class="stats-filter">
    <button class="tab ${statsRange==='daily'?'on':''}" onclick="setSR('daily')">日別</button>
    <button class="tab ${statsRange==='weekly'?'on':''}" onclick="setSR('weekly')">週別</button>
    <button class="tab ${statsRange==='monthly'?'on':''}" onclick="setSR('monthly')">月別</button>
    <button class="tab ${statsRange==='yearly'?'on':''}" onclick="setSR('yearly')">年別</button>
  </div>
  ${statsRange==='monthly'?`<div class="stats-filter"><select onchange="statsMonth=this.value;rStats()">${allMonths.map(m=>`<option value="${m}"${m===statsMonth?' selected':''}>${ymL(m)}</option>`).join('')}</select></div>`:''}
  ${statsRange==='yearly'?`<div class="stats-filter"><select onchange="statsYear=this.value;rStats()">${allYears.map(y=>`<option value="${y}"${y===statsYear?' selected':''}>${y}年</option>`).join('')}</select></div>`:''}`;

  const typeTabs=`<div class="tabs" style="margin-top:4px">
    <button class="tab ${sTab==='pie'?'on':''}" onclick="setST('pie')">支出</button>
    <button class="tab ${sTab==='pie_inc'?'on':''}" onclick="setST('pie_inc')">収入</button>
    <button class="tab ${sTab==='monthly'?'on':''}" onclick="setST('monthly')">推移</button>
  </div>`;

  // filter TX by range
  let filteredTX=[];
  let rangeLabel='';
  if(statsRange==='monthly'){
    filteredTX=TX.filter(t=>ymo(t.date)===statsMonth);
    rangeLabel=ymL(statsMonth);
  } else if(statsRange==='yearly'){
    filteredTX=TX.filter(t=>t.date.startsWith(statsYear));
    rangeLabel=statsYear+'年';
  } else if(statsRange==='daily'){
    filteredTX=TX.filter(t=>t.date===toDay());
    rangeLabel='今日';
  } else if(statsRange==='weekly'){
    const now=new Date(), ws=new Date(now);ws.setDate(now.getDate()-now.getDay());
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    filteredTX=TX.filter(t=>{const d=new Date(t.date);return d>=ws&&d<=we;});
    rangeLabel='今週';
  }

  let body='';
  if(sTab==='pie'||sTab==='pie_inc'){
    const isInc=sTab==='pie_inc';
    const ct={};
    if(isInc){
      filteredTX.filter(t=>t.type==='income').forEach(t=>{ct[t.cat]=(ct[t.cat]||0)+t.amount;});
    } else {
      filteredTX.filter(t=>t.type==='expense'||t.type==='ic_use').forEach(t=>{ct[t.cat]=(ct[t.cat]||0)+t.amount;});
      if(sTab==='pie'&&statsRange==='monthly') SS.fixedCosts.forEach(f=>{ct[f.name]=(ct[f.name]||0)+f.amount;});
    }
    const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
    const total=sorted.reduce((a,c)=>a+c[1],0);
    if(!total){body=`<div class="nodata">${rangeLabel}の${isInc?'収入':'支出'}データがありません</div>`;}
    else{
      const sz=200, cx=sz/2, cy=sz/2, r=80, ri=44;
      let paths='', ang=-Math.PI/2;
      const slices=sorted.map(([name,val])=>{
        const col=catColor(name), sw=(val/total)*Math.PI*2;
        if(sw<0.001){return {name,val,col};}
        const x1=cx+r*Math.cos(ang), y1=cy+r*Math.sin(ang);
        ang+=sw;
        const x2=cx+r*Math.cos(ang), y2=cy+r*Math.sin(ang);
        const xi1=cx+ri*Math.cos(ang-sw), yi1=cy+ri*Math.sin(ang-sw);
        const xi2=cx+ri*Math.cos(ang), yi2=cy+ri*Math.sin(ang);
        const lg=sw>Math.PI?1:0;
        paths+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
        return {name,val,col};
      });
      const lbl=isInc?'収入合計':'支出合計';
      const pieSvg=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#f0f0f0"/>${paths}<circle cx="${cx}" cy="${cy}" r="${ri}" fill="#fff"/><text x="${cx}" y="${cy-7}" text-anchor="middle" font-size="10" fill="#888" font-family="inherit">${lbl}</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a" font-family="inherit">${Math.round(total).toLocaleString('ja-JP')}円</text></svg>`;
      const legend=slices.map(s=>`<div class="pie-leg-row"><div class="pie-leg-left"><div class="pie-dot" style="background:${s.col}"></div><div class="pie-leg-name">${s.name}</div></div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:12px;color:#888;min-width:30px;text-align:right">${Math.round(s.val/total*100)}%</span><span style="font-size:13px;font-weight:700;min-width:80px;text-align:right">${fmt(s.val)}</span></div></div>`).join('');
      body=`<div class="card"><div style="display:flex;justify-content:center">${pieSvg}</div><div class="pie-legend">${legend}</div></div>`;
    }
  } else {
    // 推移グラフ
    let keys=[], getE, getI, lbl;
    if(statsRange==='monthly'){
      // 当月の週別
      const [y,m]=statsMonth.split('-');
      const dim=new Date(parseInt(y),parseInt(m),0).getDate();
      const weeks={};
      TX.filter(t=>ymo(t.date)===statsMonth).forEach(t=>{
        const d=new Date(t.date), ws=new Date(d);ws.setDate(d.getDate()-d.getDay());
        const k=ws.toISOString().split('T')[0];(weeks[k]=weeks[k]||[]).push(t);
      });
      keys=Object.keys(weeks).sort();
      getE=k=>weeks[k].filter(t=>t.type==='expense'||t.type==='ic_use').reduce((a,t)=>a+t.amount,0);
      getI=k=>weeks[k].filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
      lbl=k=>{const e=new Date(k),ed=new Date(k);ed.setDate(ed.getDate()+6);return `${fD(k)}-${fD(ed.toISOString().split('T')[0])}`;};
    } else if(statsRange==='yearly'){
      // 年内の月別
      const mset={};TX.filter(t=>t.date.startsWith(statsYear)).forEach(t=>{const k=ymo(t.date);(mset[k]=mset[k]||[]).push(t);});
      keys=Object.keys(mset).sort();
      getE=k=>mset[k].filter(t=>t.type==='expense'||t.type==='ic_use').reduce((a,t)=>a+t.amount,0)+SS.fixedCosts.reduce((a,f)=>a+f.amount,0);
      getI=k=>mset[k].filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
      lbl=k=>ymL(k);
    } else {
      // 直近6ヶ月
      const mset={};TX.forEach(t=>{const k=ymo(t.date);(mset[k]=mset[k]||[]).push(t);});
      keys=Object.keys(mset).sort().slice(-6);
      getE=k=>getExp(k);getI=k=>getInc(k);lbl=k=>ymL(k);
    }
    if(!keys.length){body='<div class="nodata">データがありません</div>';}
    else{
      const maxV=Math.max(...keys.map(k=>Math.max(getE(k),getI(k))),1);
      body='<div class="card">'+keys.reverse().map(k=>`
        <div class="month-row">
          <div class="month-lbl" style="font-size:11px">${lbl(k)}</div>
          <div class="month-bars">
            <div class="bar-line"><div class="bar-outer"><div class="bar-inner" style="width:${Math.round(getE(k)/maxV*100)}%;background:#D85A30"></div></div><span class="bar-val" style="color:#A32D2D">-${fmt(getE(k))}</span></div>
            <div class="bar-line"><div class="bar-outer"><div class="bar-inner" style="width:${Math.round(getI(k)/maxV*100)}%;background:#1D9E75"></div></div><span class="bar-val" style="color:#0F6E56">+${fmt(getI(k))}</span></div>
          </div>
        </div>`).join('')+'</div>';
    }
  }
  document.getElementById('ST').innerHTML=rangeControls+typeTabs+`<div style="margin-top:4px">${body}</div>`;
}
function setSR(r){statsRange=r;rStats();}
function setST(t){sTab=t;rStats();}

/* ===== SETTINGS ===== */
function rSet(){
  const fc=SS.fixedCosts||[];
  document.getElementById('SE').innerHTML=`
    <div class="sec-hd" style="margin-top:6px">予算・目標</div>
    <div class="card">
      <div class="set-row"><div class="set-lbl">月間予算</div><div class="set-val" onclick="openSetMdl('budget')"><span>${SS.budget>0?fmt(SS.budget):'未設定'}</span><i class="ti ti-chevron-right"></i></div></div>
      <div class="set-row"><div class="set-lbl">月間貯金目標</div><div class="set-val" onclick="openSetMdl('goal')"><span>${SS.savingGoal>0?fmt(SS.savingGoal):'未設定'}</span><i class="ti ti-chevron-right"></i></div></div>
    </div>
    <div class="sec-hd">残高の初期設定</div>
    <div class="card">
      <div class="hint" style="margin-bottom:8px">「残高修正」で正しい残高を入力してください。以後の記録との差分が自動調整されます。</div>
      <div class="set-row"><div class="set-lbl">お財布（現在）</div><div class="set-val" onclick="openBalEdit()"><span style="color:${calcWallet()<0?'#A32D2D':'inherit'}">${calcWallet()<0?'-'+fmt(calcWallet()):fmt(calcWallet())}</span><i class="ti ti-chevron-right"></i></div></div>
      <div class="set-row"><div class="set-lbl">交通系IC（現在）</div><div class="set-val" onclick="openBalEdit()"><span>${fmt(calcSuica())}</span><i class="ti ti-chevron-right"></i></div></div>
    </div>
    <div class="sec-hd">固定費（毎月の支出に自動反映）</div>
    <div class="card">
      ${fc.length?fc.map((f,i)=>`<div class="fix-item"><span style="font-size:13px">${f.name}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:#888">${fmt(f.amount)}</span><i class="ti ti-trash" style="font-size:15px;color:#D85A30;cursor:pointer" onclick="delFix(${i})"></i></div></div>`).join(''):'<div style="font-size:13px;color:#ccc;padding:4px 0">固定費がまだ登録されていません</div>'}
      <button style="margin-top:10px;width:100%;padding:9px;border:1px solid #e0e0e0;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#888" onclick="openAddFix()"><i class="ti ti-plus"></i> 固定費を追加</button>
    </div>`;
}
function openSetMdl(type){
  const cur=type==='budget'?SS.budget:SS.savingGoal;
  SHT.innerHTML=`<h2>${type==='budget'?'月間予算':'月間貯金目標'}</h2>
    <div class="frow"><label>金額（円）</label><input type="number" id="smA" value="${cur||''}" placeholder="例: 150000" inputmode="numeric"></div>
    <button class="bsav" style="width:100%;margin-top:4px" onclick="saveSetV('${type}')">保存する</button>
    ${cur>0?`<button style="width:100%;margin-top:6px;padding:9px;border:1px solid #e0e0e0;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#888" onclick="clrSetV('${type}')">設定を削除</button>`:''}
    <button class="bcls" onclick="closeOvl()">キャンセル</button>`;
  OVL.classList.add('on');
}
function saveSetV(t){const v=parseInt(document.getElementById('smA').value)||0;if(t==='budget')SS.budget=v;else SS.savingGoal=v;saveSS();closeOvl();rSet();}
function clrSetV(t){if(t==='budget')SS.budget=0;else SS.savingGoal=0;saveSS();closeOvl();rSet();}
function openAddFix(){
  SHT.innerHTML=`<h2>固定費を追加</h2>
    <div class="hint">登録すると毎月の収支に自動で加算されます。</div>
    <div class="frow"><label>名前</label><input type="text" id="ffN" placeholder="家賃・Netflix など"></div>
    <div class="frow"><label>金額（円）</label><input type="number" id="ffA" placeholder="例: 80000" inputmode="numeric"></div>
    <button class="bsav" style="width:100%;margin-top:4px" onclick="doAddFix()">追加する</button>
    <button class="bcls" onclick="closeOvl()">キャンセル</button>`;
  OVL.classList.add('on');
}
function doAddFix(){
  const name=document.getElementById('ffN').value.trim(),amt=parseInt(document.getElementById('ffA').value);
  if(!name||!amt||amt<=0){alert('名前と金額を入力してください');return;}
  SS.fixedCosts.push({name,amount:amt});saveSS();closeOvl();rSet();
}
function delFix(i){if(!confirm('削除しますか？'))return;SS.fixedCosts.splice(i,1);saveSS();rSet();}

/* ===== DETAIL (with edit & delete) ===== */
function showDtl(id){
  const t=TX.find(x=>x.id===id);if(!t)return;
  const col=catColor(t.cat);
  const tl=t.type==='income'?'収入':t.type==='charge'?'ICチャージ（収支に影響なし）':t.type==='ic_use'?'IC乗車（交通費として計上）':'支出';
  SHT.innerHTML=`<h2 style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span>${t.memo||t.cat}</h2>
    ${t.receipt?`<img src="${t.receipt}" style="width:100%;border-radius:8px;margin-bottom:12px;max-height:160px;object-fit:contain" alt="">`:''}
    <div class="dlrow"><div class="dlk">種類</div><div class="dlv">${tl}</div></div>
    <div class="dlrow"><div class="dlk">金額</div><div class="dlv">${fmt(t.amount)}</div></div>
    <div class="dlrow"><div class="dlk">カテゴリ</div><div class="dlv" style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>${t.cat}</div></div>
    <div class="dlrow"><div class="dlk">日付</div><div class="dlv">${fDF(t.date)}</div></div>
    ${t.memo?`<div class="dlrow"><div class="dlk">メモ</div><div class="dlv">${t.memo}</div></div>`:''}
    <div class="detail-actions">
      <button class="bedit" onclick="editTx('${t.id}')"><i class="ti ti-edit"></i> 編集する</button>
      <button class="bdel" onclick="delTx('${t.id}')"><i class="ti ti-trash"></i> 削除する</button>
    </div>
    <button class="bcls" onclick="closeOvl()">閉じる</button>`;
  OVL.classList.add('on');
}
function editTx(id){
  const t=TX.find(x=>x.id===id);if(!t)return;
  closeOvl();
  rAdd(t);
  showSec('add');
}
function delTx(id){
  if(!confirm('この記録を削除しますか？'))return;
  TX=TX.filter(t=>t.id!==id);saveTX();closeOvl();refresh();
}
function closeOvl(e){if(e&&e.target!==OVL)return;OVL.classList.remove('on');}

/* ===== AI CHAT ===== */
function toggleChat(){
  document.getElementById('CHAT').classList.toggle('on');
  if(document.getElementById('CHAT').classList.contains('on')&&!chatHist.length){
    addMsg('こんにちは！家計の相談はなんでもどうぞ。予算・節約・支出の見直しなどお気軽に。','ai');
  }
}
function addMsg(txt,cls){
  const div=document.createElement('div');div.className='msg '+cls;div.textContent=txt;
  document.getElementById('CMSG').appendChild(div);
  document.getElementById('CMSG').scrollTop=9999;
  return div;
}
async function sendChat(){
  const inp=document.getElementById('CINP');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';addMsg(txt,'user');
  const thinking=addMsg('考え中…','ai thinking');
  chatHist.push({role:'user',content:txt});
  const cm=ymNow();
  const ctx=`今月収入:${fmt(getInc(cm))} 支出:${fmt(getExp(cm))} 予算:${SS.budget>0?fmt(SS.budget):'未設定'} 貯金目標:${SS.savingGoal>0?fmt(SS.savingGoal):'未設定'} IC残高:${fmt(calcSuica())} 固定費:${fmt(SS.fixedCosts.reduce((a,f)=>a+f.amount,0))}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        system:`あなたは家計管理AIアドバイザーです。ユーザーの家計データを参考に、親切・簡潔に日本語でアドバイスしてください。回答は4文以内でコンパクトに。【家計】${ctx}`,
        messages:chatHist})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'うまく回答できませんでした。';
    thinking.remove();addMsg(reply,'ai');
    chatHist.push({role:'assistant',content:reply});
  }catch(e){thinking.remove();addMsg('通信エラーが発生しました。','ai');}
}

const OVL=document.getElementById('OVL'), SHT=document.getElementById('SHT');
loadData();showSec('home');
